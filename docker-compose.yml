services:
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: bing_scraper
      POSTGRES_USER: bing_user
      POSTGRES_PASSWORD: bing_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bing_user -d bing_scraper"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
