target-version = "py312"
line-length = 120

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line too long — ruff-format handles this
    "SIM105", # suppressible-exception — we use broad try/except intentionally
    "B904",   # raise-without-from-inside-except — too noisy in Django views
]

[lint.per-file-ignores]
"*/migrations/*" = ["E501", "F401", "F811"]
"tests/*" = ["S101", "B011"]

[format]
quote-style = "single"
indent-style = "space"
